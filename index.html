<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <h1 id="headerTitle">Portfolio de Ekimilson</h1>
      <p class="header-sub">Última atualização: <span id="lastUpdate">-</span> • Câmbio: <span id="fxRate">-</span> • <span id="totalValue">-</span></p>
    </div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="account-selector">
        <select id="accountSelect" onchange="switchAccount(this.value)"></select>
        <button class="btn btn-sm" onclick="addAccount()">+ Conta</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" id="btnPrevYear"></button>
        <button class="btn btn-sm active" id="btnCurYear"></button>
        <button class="btn btn-sm" id="btnNextYear"></button>
      </div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="export-bar">
  <div class="export-bar-left">
    <button class="btn btn-sm" onclick="refreshPrices()" id="btnRefresh">🔄 Atualizar Preços</button>
    <span class="update-indicator" id="updateStatus">Última: <span id="lastPriceUpdate">-</span></span>
  </div>
  <div class="export-bar-right">
    <button class="btn btn-sm" onclick="exportData()">📥 Exportar JSON</button>
    <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">📤 Importar JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-sm" onclick="document.getElementById('importCSV').click()">📊 Importar CSV</button>
    <input type="file" id="importCSV" accept=".csv" style="display:none" onchange="importCSVData(event)">
    <button class="btn btn-sm" onclick="saveData();showToast('Dados guardados!')">💾 Guardar</button>
  </div>
</div>
<div class="content" id="content"></div>
<div id="toastContainer"></div>
<script type="module" src="app.js"></script>
</body>
</html>
